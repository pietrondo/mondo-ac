<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Mondo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #1a1a2e; }
    #canvas-container { width: 100vw; height: 100vh; }
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: radial-gradient(circle, #1a1a2e 0%, #0d0d18 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      font-family: system-ui, -apple-system, sans-serif;
      color: white;
    }
    .loading-title {
      font-size: 2.5rem;
      font-weight: 900;
      letter-spacing: 4px;
      margin-bottom: 24px;
      color: #00E5FF;
      text-shadow: 0 0 20px rgba(0, 229, 255, 0.6);
    }
    .loading-bar-container {
      width: 320px;
      height: 16px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(0, 229, 255, 0.4);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
    }
    .loading-bar-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #00E5FF, #76FF03);
      border-radius: 10px;
      transition: width 0.2s ease-out;
      box-shadow: 0 0 10px #00E5FF;
    }
    .loading-status {
      margin-top: 14px;
      font-size: 0.95rem;
      color: #b0bec5;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <div id="loading" class="loading-overlay">
    <h1 class="loading-title">MONDO 3D</h1>
    <div class="loading-bar-container">
      <div id="loading-bar-fill" class="loading-bar-fill"></div>
    </div>
    <p id="loading-status" class="loading-status">Inizializzazione gioco (0%)...</p>
  </div>
  <div id="error-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(30, 10, 10, 0.95); z-index: 10000; align-items: center; justify-content: center; flex-direction: column; font-family: system-ui, sans-serif; color: #ff5555; text-align: center; padding: 20px;">
    <h1 style="font-size: 3rem; margin-bottom: 20px; text-transform: uppercase; text-shadow: 0 0 20px rgba(255, 85, 85, 0.4);">Errore di Sistema</h1>
    <p id="error-message" style="font-size: 1.25rem; color: #e2e8f0; max-width: 600px; margin-bottom: 30px; line-height: 1.6;"></p>
    <button id="error-reload-btn" style="background: #ff4444; color: white; border: none; padding: 12px 30px; font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: background 0.2s;">Ricarica Gioco</button>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>

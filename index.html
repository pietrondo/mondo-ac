<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Mondo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #1a1a2e; }
    #canvas-container { width: 100vw; height: 100vh; }
    .loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-family: system-ui; }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <div id="loading" class="loading">Caricamento...</div>
  <div id="error-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(30, 10, 10, 0.95); z-index: 10000; align-items: center; justify-content: center; flex-direction: column; font-family: system-ui, sans-serif; color: #ff5555; text-align: center; padding: 20px;">
    <h1 style="font-size: 3rem; margin-bottom: 20px; text-transform: uppercase; text-shadow: 0 0 20px rgba(255, 85, 85, 0.4);">Errore di Sistema</h1>
    <p id="error-message" style="font-size: 1.25rem; color: #e2e8f0; max-width: 600px; margin-bottom: 30px; line-height: 1.6;"></p>
    <button id="error-reload-btn" style="background: #ff4444; color: white; border: none; padding: 12px 30px; font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: background 0.2s;">Ricarica Gioco</button>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
